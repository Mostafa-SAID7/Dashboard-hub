<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.1" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Main dashboard icon -->
  <g transform="translate(50, 50)">
    <!-- Dashboard grid -->
    <rect x="10" y="10" width="30" height="30" fill="url(#logoGradient)" rx="3"/>
    <rect x="50" y="10" width="30" height="30" fill="url(#logoGradient)" rx="3" opacity="0.7"/>
    <rect x="10" y="50" width="30" height="30" fill="url(#logoGradient)" rx="3" opacity="0.7"/>
    <rect x="50" y="50" width="30" height="30" fill="url(#logoGradient)" rx="3"/>
    
    <!-- Chart bars -->
    <rect x="15" y="65" width="4" height="15" fill="url(#logoGradient)"/>
    <rect x="22" y="60" width="4" height="20" fill="url(#logoGradient)"/>
    <rect x="29" y="70" width="4" height="10" fill="url(#logoGradient)"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="url(#logoGradient)">Dashboard</text>
</svg>